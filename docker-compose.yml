services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - eventhub-data:/var/lib/eventhub
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy

volumes:
  eventhub-data:
  caddy-data:
  caddy-config:

networks:
  internal:
