services:
  - type: web
    name: eventhub
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start:server
    disk:
      name: eventhub-data
      mountPath: /var/lib/eventhub
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/lib/eventhub/eventhub.sqlite
      - key: BACKUP_DIR
        value: /var/lib/eventhub/backups
      - key: APP_URL
        value: https://eventhub.kopaegroup.com
      - key: CORS_ORIGINS
        value: https://eventhub.kopaegroup.com
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: info
      - key: QR_CHECKSUM_SALT
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
