services:
  - type: web
    name: eventhub
    env: node
    buildCommand: npm ci && npm run build
    startCommand: node server-dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://eventhub.kopaegroup.com
      - key: CORS_ORIGINS
        value: https://eventhub.kopaegroup.com
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: info
      - key: QR_CHECKSUM_SALT
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
