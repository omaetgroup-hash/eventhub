<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub</title>
    <meta
      name="description"
      content="EventHub by Kapoe. A premium live event platform for discovery, ticketing, venue operations, and real-time analytics."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        if (!('serviceWorker' in navigator) || sessionStorage.getItem('eventhub-sw-reset') === 'done') {
          return;
        }

        sessionStorage.setItem('eventhub-sw-reset', 'done');

        navigator.serviceWorker.getRegistrations().then((registrations) => {
          if (!registrations.length) {
            return;
          }

          return Promise.all(registrations.map((registration) => registration.unregister()))
            .then(() => ('caches' in window ? caches.keys() : Promise.resolve([])))
            .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
            .then(() => window.location.reload());
        }).catch(() => {
          sessionStorage.removeItem('eventhub-sw-reset');
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
